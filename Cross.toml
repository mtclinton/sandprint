# Configuration for cross-rs (https://github.com/cross-rs/cross).
#
# libbpf-sys's vendored static build of libbpf links against libelf and
# zlib, neither of which is installed for the target architecture in
# cross's default Docker images. Add the multiarch foreign architecture
# and install the dev packages for it before the build runs.

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update",
    "apt-get install --assume-yes libelf-dev:$CROSS_DEB_ARCH zlib1g-dev:$CROSS_DEB_ARCH pkg-config",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = [
    "PKG_CONFIG_ALLOW_CROSS",
    "PKG_CONFIG_LIBDIR",
]
