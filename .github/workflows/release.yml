name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          # aarch64 release artifact is produced manually for now; see
          # ci.yml for the rationale (cross-rs base image is too old
          # for BPF_MAP_TYPE_RINGBUF UAPI).
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: install host deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libelf-dev zlib1g-dev linux-libc-dev
      - name: install cross
        if: matrix.cross
        run: cargo install cross --locked
      - name: build (native)
        if: '!matrix.cross'
        run: cargo build --release --target ${{ matrix.target }}
      - name: build (cross)
        if: matrix.cross
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_LIBDIR: /usr/lib/aarch64-linux-gnu/pkgconfig
        run: cross build --release --target ${{ matrix.target }}
      - name: package
        run: |
          ARCHIVE="sandprint-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -czvf "$ARCHIVE" -C target/${{ matrix.target }}/release sandprint
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
          generate_release_notes: true
